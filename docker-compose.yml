services:
  screener:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - SCREENER_TELEGRAM_TOKEN=${SCREENER_TELEGRAM_TOKEN:-}
    restart: unless-stopped
    stdin_open: true  # docker run -i
    tty: true         # docker run -t
    command: ["uv", "run", "python", "-m", "screener", "--mode", "both"]
